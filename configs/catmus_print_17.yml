run_name: "catmus_pipeline_roman_17_1"
output_dir: "results"
device: "cuda"
use_wandb: false

data:
  test: "../data/corpus_roman_17/corpus_roman_17_part_1"

tasks:
  layout: 
    type: YoloLayout
    config:
      model_path: "src/tasks/layout/models/yolo26s_layout_640px_16bs_50e.pt"
      img_size: 640

  line:
    type: YoloLine
    config:
      model_path: "src/tasks/line/models/yolo26s_line_640px_16bs_50e.pt"
      img_size: 640
      batch_size: 4
      text_direction: "horizontal-lr"
  htr:
    type: KrakenHTR
    config:
      model_path: "src/tasks/htr/models/catmus-print-fondue-large.mlmodel"