run_name: "Qwen4B_linelvl_occitansilver"
output_dir: "results"
device: "cuda"
use_wandb: false
wandb_project: "icdar-htr-competition-2026"
save_image: true

data:
  train: "./silver_reweight"

tasks:
  htr:
    type: VLMSILVERHTR
    config:
      use_metadata: true
      model_name: "Qwen/Qwen3.5-4B"
      device_map: "auto"
      max_new_tokens: 128
      line_batch_size: 8
      max_pixels: 401408

      # LoRA
      use_4bit: false
      use_8bit: true
      lora_r: 64
      lora_dropout: 0
      use_rlora: false
      max_seq_length: 512
      train_batch_size: 16
      gradient_accumulation_steps: 2
      warmup_ratio: 0.01
      epochs: 1

      # lr 
      learning_rate: 5.0e-5
      weight_decay: 0.02
      dataset_num_proc: 4
      prompt: >
        Transcribe the handwritten text in this line image.
        Keep abbreviations, do not translate or modernize the text.
        Output ONLY the transcription. No explanation, no punctuation added, no modernization.