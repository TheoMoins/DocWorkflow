run_name: "Qwen3.5_4B_silver_gold_platinum_romances"
output_dir: "results"
device: "cuda"
use_wandb: true
wandb_project: "icdar-htr-competition-2026"
save_image: true

data:
  train:
    - "../data/ICDAR_Competition/train_romance"
  valid: "../data/ICDAR_Competition/valid"
  test: "../data/ICDAR_Competition/test"

tasks:
  htr:
    type: VLMLineHTR
    config:
      use_metadata: true
      model_name: src/tasks/htr/models/Qwen3.5-4B-HTR_VLM_Line_Level_Silver-line-finetuned-line-finetuned
      base_model: 'Qwen/Qwen3.5-4B'
      device_map: "auto"
      max_new_tokens: 128
      line_batch_size: 8
      max_pixels: 401408

      prompt_template: >
        Transcribe the handwritten text in this line image.
        {conventions}
        Output ONLY the transcription.